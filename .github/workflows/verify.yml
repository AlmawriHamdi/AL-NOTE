name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_COMMIT: ee80f08bbf97172ec030b8751ceab557177a34a6
  FLUTTER_VERSION: 3.44.6
  FLUTTER_REPOSITORY: https://github.com/flutter/flutter.git

jobs:
  linux:
    name: Ubuntu verification and Linux debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Linux build packages
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes \
            clang \
            cmake \
            libgtk-3-dev \
            libstdc++-12-dev \
            ninja-build \
            pkg-config

      - name: Install pinned Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          flutter_root="$RUNNER_TEMP/flutter"
          git init "$flutter_root"
          git -C "$flutter_root" remote add origin "$FLUTTER_REPOSITORY"
          git -C "$flutter_root" fetch --depth=1 origin "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
          git -C "$flutter_root" checkout --detach "$FLUTTER_VERSION"
          actual_commit="$(git -C "$flutter_root" rev-parse HEAD)"
          test "$actual_commit" = "$FLUTTER_COMMIT"
          echo "$flutter_root/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter toolchain
        run: |
          flutter config --no-analytics
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build Linux debug application
        run: flutter build linux --debug

  android:
    name: Ubuntu Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          flutter_root="$RUNNER_TEMP/flutter"
          git init "$flutter_root"
          git -C "$flutter_root" remote add origin "$FLUTTER_REPOSITORY"
          git -C "$flutter_root" fetch --depth=1 origin "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
          git -C "$flutter_root" checkout --detach "$FLUTTER_VERSION"
          actual_commit="$(git -C "$flutter_root" rev-parse HEAD)"
          test "$actual_commit" = "$FLUTTER_COMMIT"
          echo "$flutter_root/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter toolchain
        run: |
          flutter config --no-analytics
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build Android debug APK
        run: flutter build apk --debug

  web:
    name: Ubuntu Web build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          flutter_root="$RUNNER_TEMP/flutter"
          git init "$flutter_root"
          git -C "$flutter_root" remote add origin "$FLUTTER_REPOSITORY"
          git -C "$flutter_root" fetch --depth=1 origin "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
          git -C "$flutter_root" checkout --detach "$FLUTTER_VERSION"
          actual_commit="$(git -C "$flutter_root" rev-parse HEAD)"
          test "$actual_commit" = "$FLUTTER_COMMIT"
          echo "$flutter_root/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter toolchain
        run: |
          flutter config --no-analytics
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build Web application
        run: flutter build web

  windows:
    name: Windows verification and Windows debug build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pinned Flutter SDK
        shell: pwsh
        run: |
          $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter'
          git init $flutterRoot
          git -C $flutterRoot remote add origin $env:FLUTTER_REPOSITORY
          $flutterTagRef = "refs/tags/$($env:FLUTTER_VERSION):refs/tags/$($env:FLUTTER_VERSION)"
          git -C $flutterRoot fetch --depth=1 origin $flutterTagRef
          git -C $flutterRoot checkout --detach $env:FLUTTER_VERSION
          $actualCommit = (git -C $flutterRoot rev-parse HEAD).Trim()
          if ($actualCommit -ne $env:FLUTTER_COMMIT) {
            throw "Expected Flutter $env:FLUTTER_COMMIT but found $actualCommit"
          }
          $flutterBin = Join-Path $flutterRoot 'bin'
          $flutterBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Flutter toolchain
        shell: pwsh
        run: |
          flutter config --no-analytics
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get --enforce-lockfile

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build Windows debug application
        run: flutter build windows --debug
